<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Monitoring Dashboard - Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        .glass-card {
            @apply bg-white/80 backdrop-blur-md border border-gray-200/50 rounded-xl shadow-lg;
        }
        .metric-card {
            @apply glass-card p-6 hover:shadow-xl transition-all duration-300 hover:scale-[1.02];
        }
        .insight-card {
            @apply glass-card p-6 bg-gradient-to-br from-blue-50 to-indigo-50;
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        .animate-slide-up {
            animation: slideUp 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { Activity, Sun, Moon, Clock, TrendingUp, AlertTriangle, MapPin, Brain, BarChart3, ChevronDown, ChevronUp } = lucide;

        // Mock data service
        const generateMockData = () => {
            const mockData = [];
            const locations = ['Living Room', 'Kitchen', 'Bedroom', 'Hallway', 'Garage'];
            const now = new Date();
            
            for (let i = 0; i < 50; i++) {
                const timestamp = new Date(now.getTime() - (i * 30 * 60 * 1000));
                mockData.push({
                    timestamp: timestamp.toISOString(),
                    motion: 'Motion Detected',
                    location: locations[Math.floor(Math.random() * locations.length)],
                    confidence: Math.floor(Math.random() * 30) + 70
                });
            }
            
            return mockData.reverse();
        };

        // MetricCards Component
        const MetricCards = ({ data }) => {
            const totalEvents = data.length;
            const latestEvent = data.length > 0 ? data[0] : null;
            const todayEvents = data.filter(event => {
                const eventDate = new Date(event.timestamp);
                const today = new Date();
                return eventDate.toDateString() === today.toDateString();
            }).length;

            const averageConfidence = data.length > 0 
                ? Math.round(data.reduce((sum, event) => sum + (parseInt(event.confidence) || 0), 0) / data.length)
                : 0;

            const formatTime = (timestamp) => {
                return new Date(timestamp).toLocaleTimeString('en-US', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
            };

            const formatDate = (timestamp) => {
                return new Date(timestamp).toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    year: 'numeric'
                });
            };

            return React.createElement('div', { className: "grid grid-cols-1 md:grid-cols-2 gap-4" },
                React.createElement('div', { className: "metric-card animate-fade-in" },
                    React.createElement('div', { className: "flex items-center justify-between" },
                        React.createElement('div', null,
                            React.createElement('p', { className: "text-sm font-medium text-gray-600" }, "Total Motion Events"),
                            React.createElement('p', { className: "text-3xl font-bold text-gray-900 mt-2" }, totalEvents.toLocaleString())
                        ),
                        React.createElement('div', { className: "p-3 bg-blue-100 rounded-lg" },
                            React.createElement(Activity, { className: "h-6 w-6 text-blue-600" })
                        )
                    )
                ),
                React.createElement('div', { className: "metric-card animate-fade-in", style: { animationDelay: '0.1s' } },
                    React.createElement('div', { className: "flex items-center justify-between" },
                        React.createElement('div', null,
                            React.createElement('p', { className: "text-sm font-medium text-gray-600" }, "Today's Events"),
                            React.createElement('p', { className: "text-3xl font-bold text-gray-900 mt-2" }, todayEvents.toLocaleString())
                        ),
                        React.createElement('div', { className: "p-3 bg-green-100 rounded-lg" },
                            React.createElement(TrendingUp, { className: "h-6 w-6 text-green-600" })
                        )
                    )
                ),
                React.createElement('div', { className: "metric-card animate-fade-in", style: { animationDelay: '0.2s' } },
                    React.createElement('div', { className: "flex items-center justify-between" },
                        React.createElement('div', null,
                            React.createElement('p', { className: "text-sm font-medium text-gray-600" }, "Latest Event"),
                            React.createElement('p', { className: "text-lg font-semibold text-gray-900 mt-2" }, latestEvent ? formatTime(latestEvent.timestamp) : 'No data'),
                            React.createElement('p', { className: "text-sm text-gray-500 mt-1" }, latestEvent ? formatDate(latestEvent.timestamp) : '')
                        ),
                        React.createElement('div', { className: "p-3 bg-orange-100 rounded-lg" },
                            React.createElement(Clock, { className: "h-6 w-6 text-orange-600" })
                        )
                    )
                ),
                React.createElement('div', { className: "metric-card animate-fade-in", style: { animationDelay: '0.3s' } },
                    React.createElement('div', { className: "flex items-center justify-between" },
                        React.createElement('div', null,
                            React.createElement('p', { className: "text-sm font-medium text-gray-600" }, "Avg Confidence"),
                            React.createElement('p', { className: "text-3xl font-bold text-gray-900 mt-2" }, `${averageConfidence}%`)
                        ),
                        React.createElement('div', { className: "p-3 bg-purple-100 rounded-lg" },
                            React.createElement(MapPin, { className: "h-6 w-6 text-purple-600" })
                        )
                    )
                )
            );
        };

        // EventTimeline Component
        const EventTimeline = ({ data }) => {
            const [showAll, setShowAll] = useState(false);
            const displayData = showAll ? data : data.slice(0, 10);

            const formatTime = (timestamp) => {
                return new Date(timestamp).toLocaleTimeString('en-US', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
            };

            const formatDate = (timestamp) => {
                return new Date(timestamp).toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    year: 'numeric'
                });
            };

            return React.createElement('div', { className: "glass-card animate-slide-up" },
                React.createElement('div', { className: "flex items-center justify-between mb-6" },
                    React.createElement('h2', { className: "text-xl font-semibold text-gray-900 flex items-center" },
                        React.createElement(Clock, { className: "h-5 w-5 mr-2 text-blue-600" }),
                        "Event Timeline"
                    ),
                    data.length > 10 && React.createElement('button', {
                        onClick: () => setShowAll(!showAll),
                        className: "flex items-center text-sm text-blue-600 hover:text-blue-700"
                    },
                        showAll ? "Show Less" : `Show All (${data.length})`,
                        showAll ? React.createElement(ChevronUp, { className: "h-4 w-4 ml-1" }) : React.createElement(ChevronDown, { className: "h-4 w-4 ml-1" })
                    )
                ),
                React.createElement('div', { className: "overflow-x-auto" },
                    React.createElement('div', { className: "space-y-3 max-h-96 overflow-y-auto" },
                        displayData.length === 0 
                            ? React.createElement('div', { className: "text-center py-8 text-gray-500" }, "No events recorded")
                            : displayData.map((event, index) =>
                                React.createElement('div', {
                                    key: index,
                                    className: "flex items-center justify-between p-4 bg-gray-50 rounded-lg hover:bg-gray-100 transition-colors"
                                },
                                    React.createElement('div', { className: "flex items-center space-x-4" },
                                        React.createElement('div', { className: "flex-shrink-0" },
                                            React.createElement('div', { className: "p-2 bg-blue-100 rounded-lg" },
                                                React.createElement(Activity, { className: "h-4 w-4 text-blue-600" })
                                            )
                                        ),
                                        React.createElement('div', { className: "flex-1 min-w-0" },
                                            React.createElement('div', { className: "flex items-center space-x-2" },
                                                React.createElement('p', { className: "text-sm font-medium text-gray-900 truncate" }, event.motion || 'Motion Detected'),
                                                React.createElement('span', { className: `px-2 py-1 text-xs font-medium rounded-full ${event.confidence >= 80 ? 'bg-green-100 text-green-600' : event.confidence >= 60 ? 'bg-yellow-100 text-yellow-600' : 'bg-red-100 text-red-600'}` }, `${event.confidence || 'N/A'}%`)
                                            ),
                                            React.createElement('div', { className: "flex items-center space-x-4 mt-1" },
                                                React.createElement('div', { className: "flex items-center text-sm text-gray-500" },
                                                    React.createElement(MapPin, { className: "h-3 w-3 mr-1" }),
                                                    event.location || 'Unknown'
                                                ),
                                                React.createElement('div', { className: "text-sm text-gray-500" }, formatTime(event.timestamp))
                                            )
                                        )
                                    ),
                                    React.createElement('div', { className: "text-right" },
                                        React.createElement('div', { className: "text-sm text-gray-500" }, formatDate(event.timestamp))
                                    )
                                )
                            )
                    )
                )
            );
        };

        // AIInsights Component
        const AIInsights = ({ data }) => {
            const insights = useMemo(() => {
                if (data.length === 0) {
                    return {
                        peakHour: 'No data',
                        peakHourCount: 0,
                        dailyAverage: 0,
                        mostActiveLocation: 'No data',
                        anomalyDetected: false,
                        pattern: 'No patterns detected',
                        recommendations: []
                    };
                }

                const hourlyCounts = {};
                const locationCounts = {};

                data.forEach(event => {
                    const hour = new Date(event.timestamp).getHours();
                    hourlyCounts[hour] = (hourlyCounts[hour] || 0) + 1;
                    
                    const location = event.location || 'Unknown';
                    locationCounts[location] = (locationCounts[location] || 0) + 1;
                });

                const peakHour = Object.entries(hourlyCounts).reduce((a, b) => 
                    hourlyCounts[a[0]] > hourlyCounts[b[0]] ? a : b
                );

                const mostActiveLocation = Object.entries(locationCounts).reduce((a, b) => 
                    locationCounts[a[0]] > locationCounts[b[0]] ? a : b
                );

                const dailyAverage = Math.round(data.length / 7);

                const todayEvents = data.filter(event => {
                    const eventDate = new Date(event.timestamp);
                    const today = new Date();
                    return eventDate.toDateString() === today.toDateString();
                });

                const anomalyDetected = todayEvents.length > dailyAverage * 2;

                let pattern = 'Regular activity pattern';
                let recommendations = ['Activity patterns appear normal'];

                if (peakHour[0] >= 6 && peakHour[0] <= 9) {
                    pattern = 'Morning activity pattern detected';
                    recommendations = ['Consider adjusting morning security protocols'];
                } else if (peakHour[0] >= 18 && peakHour[0] <= 22) {
                    pattern = 'Evening activity pattern detected';
                    recommendations = ['Enhanced evening monitoring recommended'];
                }

                if (anomalyDetected) {
                    recommendations.push('High activity alert: Investigate unusual motion patterns');
                }

                return {
                    peakHour: `${peakHour[0]}:00`,
                    peakHourCount: peakHour[1],
                    dailyAverage,
                    mostActiveLocation: mostActiveLocation[0],
                    anomalyDetected,
                    pattern,
                    recommendations
                };
            }, [data]);

            return React.createElement('div', { className: "insight-card animate-slide-up" },
                React.createElement('div', { className: "flex items-center mb-6" },
                    React.createElement(Brain, { className: "h-5 w-5 mr-2 text-blue-600" }),
                    React.createElement('h2', { className: "text-xl font-semibold text-gray-900" }, "AI Insights")
                ),
                React.createElement('div', { className: "space-y-4" },
                    React.createElement('div', { className: "p-4 bg-white/50 rounded-lg" },
                        React.createElement('div', { className: "flex items-center justify-between mb-2" },
                            React.createElement('span', { className: "text-sm font-medium text-gray-600" }, "Peak Activity Hour"),
                            React.createElement(Clock, { className: "h-4 w-4 text-blue-600" })
                        ),
                        React.createElement('p', { className: "text-lg font-semibold text-gray-900" }, insights.peakHour),
                        React.createElement('p', { className: "text-sm text-gray-500" }, `${insights.peakHourCount} events`)
                    ),
                    React.createElement('div', { className: "p-4 bg-white/50 rounded-lg" },
                        React.createElement('div', { className: "flex items-center justify-between mb-2" },
                            React.createElement('span', { className: "text-sm font-medium text-gray-600" }, "Most Active Location"),
                            React.createElement(MapPin, { className: "h-4 w-4 text-blue-600" })
                        ),
                        React.createElement('p', { className: "text-lg font-semibold text-gray-900" }, insights.mostActiveLocation)
                    ),
                    React.createElement('div', { className: "p-4 bg-white/50 rounded-lg" },
                        React.createElement('div', { className: "flex items-center justify-between mb-2" },
                            React.createElement('span', { className: "text-sm font-medium text-gray-600" }, "Daily Average"),
                            React.createElement(Activity, { className: "h-4 w-4 text-blue-600" })
                        ),
                        React.createElement('p', { className: "text-lg font-semibold text-gray-900" }, `${insights.dailyAverage} events/day`)
                    ),
                    insights.anomalyDetected && React.createElement('div', { className: "p-4 bg-red-50 border border-red-200 rounded-lg" },
                        React.createElement('div', { className: "flex items-center mb-2" },
                            React.createElement(AlertTriangle, { className: "h-4 w-4 text-red-600 mr-2" }),
                            React.createElement('span', { className: "text-sm font-medium text-red-800" }, "Anomaly Detected")
                        ),
                        React.createElement('p', { className: "text-sm text-red-700" }, "Unusually high activity detected today")
                    ),
                    React.createElement('div', { className: "p-4 bg-gradient-to-r from-blue-50 to-indigo-50 rounded-lg" },
                        React.createElement('div', { className: "flex items-center mb-2" },
                            React.createElement(TrendingUp, { className: "h-4 w-4 text-blue-600 mr-2" }),
                            React.createElement('span', { className: "text-sm font-medium text-gray-700" }, "Pattern Analysis")
                        ),
                        React.createElement('p', { className: "text-sm text-gray-600 mb-3" }, insights.pattern),
                        React.createElement('div', { className: "space-y-2" },
                            React.createElement('span', { className: "text-xs font-medium text-gray-500 uppercase tracking-wider" }, "Recommendations"),
                            insights.recommendations.map((rec, index) =>
                                React.createElement('div', { key: index, className: "flex items-start" },
                                    React.createElement('div', { className: "h-1.5 w-1.5 rounded-full bg-blue-600 mt-1.5 mr-2 flex-shrink-0" }),
                                    React.createElement('p', { className: "text-xs text-gray-600" }, rec)
                                )
                            )
                        )
                    )
                )
            );
        };

        // Charts Component
        const Charts = ({ data }) => {
            const chartRef = React.useRef(null);
            const lineChartRef = React.useRef(null);

            useEffect(() => {
                if (!chartRef.current || data.length === 0) return;

                const hourlyData = {};
                for (let i = 0; i < 24; i++) {
                    hourlyData[i] = 0;
                }
                
                data.forEach(event => {
                    const hour = new Date(event.timestamp).getHours();
                    hourlyData[hour]++;
                });

                const ctx = chartRef.current.getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: Object.keys(hourlyData).map(h => `${h}:00`),
                        datasets: [{
                            label: 'Motion Events',
                            data: Object.values(hourlyData),
                            backgroundColor: 'rgba(59, 130, 246, 0.5)',
                            borderColor: 'rgba(59, 130, 246, 1)',
                            borderWidth: 1,
                            borderRadius: 4,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: { color: 'rgba(156, 163, 175, 0.1)' }
                            },
                            x: {
                                grid: { display: false }
                            }
                        }
                    }
                });

                // Line chart for daily trend
                const dailyData = {};
                const last7Days = [];
                
                for (let i = 6; i >= 0; i--) {
                    const date = new Date();
                    date.setDate(date.getDate() - i);
                    date.setHours(0, 0, 0, 0);
                    const dateStr = date.toDateString();
                    last7Days.push(dateStr);
                    dailyData[dateStr] = 0;
                }
                
                data.forEach(event => {
                    const eventDate = new Date(event.timestamp);
                    eventDate.setHours(0, 0, 0, 0);
                    const dateStr = eventDate.toDateString();
                    if (dailyData.hasOwnProperty(dateStr)) {
                        dailyData[dateStr]++;
                    }
                });

                const lineCtx = lineChartRef.current.getContext('2d');
                new Chart(lineCtx, {
                    type: 'line',
                    data: {
                        labels: last7Days.map(date => new Date(date).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })),
                        datasets: [{
                            label: 'Daily Motion Events',
                            data: last7Days.map(date => dailyData[date]),
                            borderColor: 'rgba(59, 130, 246, 1)',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: { color: 'rgba(156, 163, 175, 0.1)' }
                            },
                            x: {
                                grid: { display: false }
                            }
                        }
                    }
                });
            }, [data]);

            return React.createElement('div', { className: "space-y-6" },
                React.createElement('div', { className: "glass-card animate-slide-up" },
                    React.createElement('h2', { className: "text-xl font-semibold text-gray-900 mb-6 flex items-center" },
                        React.createElement(BarChart3, { className: "h-5 w-5 mr-2 text-blue-600" }),
                        "Hourly Activity Distribution"
                    ),
                    React.createElement('div', { className: "h-64" },
                        React.createElement('canvas', { ref: chartRef })
                    )
                ),
                React.createElement('div', { className: "glass-card animate-slide-up", style: { animationDelay: '0.1s' } },
                    React.createElement('h2', { className: "text-xl font-semibold text-gray-900 mb-6 flex items-center" },
                        React.createElement(TrendingUp, { className: "h-5 w-5 mr-2 text-blue-600" }),
                        "7-Day Trend"
                    ),
                    React.createElement('div', { className: "h-64" },
                        React.createElement('canvas', { ref: lineChartRef })
                    )
                )
            );
        };

        // Main App Component
        const App = () => {
            const [darkMode, setDarkMode] = useState(false);
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const loadData = async () => {
                    try {
                        setLoading(true);
                        // In a real app, this would fetch from the Google Sheets CSV
                        // For demo, we'll use mock data
                        setData(generateMockData());
                    } catch (err) {
                        console.error('Failed to load data:', err);
                    } finally {
                        setLoading(false);
                    }
                };

                loadData();
                
                const interval = setInterval(loadData, 30000);
                return () => clearInterval(interval);
            }, []);

            if (loading) {
                return React.createElement('div', { className: "min-h-screen bg-gray-50 flex items-center justify-center" },
                    React.createElement('div', { className: "text-center" },
                        React.createElement('div', { className: "animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto" }),
                        React.createElement('p', { className: "mt-4 text-gray-600" }, "Loading dashboard...")
                    )
                );
            }

            return React.createElement('div', { className: "min-h-screen bg-gray-50" },
                React.createElement('header', { className: "bg-white shadow-sm border-b border-gray-200" },
                    React.createElement('div', { className: "max-w-7xl mx-auto px-4 sm:px-6 lg:px-8" },
                        React.createElement('div', { className: "flex justify-between items-center py-4" },
                            React.createElement('div', { className: "flex items-center space-x-3" },
                                React.createElement(Activity, { className: "h-8 w-8 text-blue-600" }),
                                React.createElement('div', null,
                                    React.createElement('h1', { className: "text-2xl font-bold text-gray-900" }, "Smart Monitoring Dashboard"),
                                    React.createElement('p', { className: "text-sm text-gray-500" }, "Real-time motion detection insights")
                                )
                            ),
                            React.createElement('button', {
                                onClick: () => setDarkMode(!darkMode),
                                className: "p-2 rounded-lg bg-gray-100 hover:bg-gray-200 transition-colors"
                            },
                                darkMode ? React.createElement(Sun, { className: "h-5 w-5 text-yellow-500" }) : React.createElement(Moon, { className: "h-5 w-5 text-gray-700" })
                            )
                        )
                    )
                ),
                React.createElement('main', { className: "max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8" },
                    React.createElement('div', { className: "grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8" },
                        React.createElement('div', { className: "lg:col-span-2" },
                            React.createElement(MetricCards, { data })
                        ),
                        React.createElement('div', null,
                            React.createElement(AIInsights, { data })
                        )
                    ),
                    React.createElement('div', { className: "grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8" },
                        React.createElement(Charts, { data }),
                        React.createElement(EventTimeline, { data })
                    )
                ),
                React.createElement('footer', { className: "bg-white border-t border-gray-200 mt-auto" },
                    React.createElement('div', { className: "max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4" },
                        React.createElement('div', { className: "flex items-center justify-between" },
                            React.createElement('p', { className: "text-sm text-gray-500" }, `Last updated: ${new Date().toLocaleString()}`),
                            React.createElement('div', { className: "flex items-center space-x-2" },
                                React.createElement('div', { className: "h-2 w-2 bg-green-500 rounded-full animate-pulse" }),
                                React.createElement('span', { className: "text-sm text-gray-500" }, "Live")
                            )
                        )
                    )
                )
            );
        };

        // Render the app
        ReactDOM.render(React.createElement(App), document.getElementById('root'));
    </script>
</body>
</html>
